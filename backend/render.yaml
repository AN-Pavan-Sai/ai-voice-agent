services:
  - type: web
    name: ai-voice-agent-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SARVAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
